    <!-- 2. FORM -->
    <h2>Registration Form</h2>
    <div class="form-container">
    <form onsubmit="return validateForm()" novalidate>
        
        <!-- Basic Inputs -->
        <label>Name:</label>
        <input type="text" id="name" name="Name" placeholder="Enter name" required><br><br>

        <label>Email:</label>
        <input type="email" id="email" name="Email" placeholder="Enter email" required><br><br>

        <label>Password:</label>
        <input type="password" id="password" name="Password" placeholder="Password" required><br><br>

        <!-- Radio -->
         <div class="gender">
        <label>Gender:</label>
        <input type="radio" name="gender" value="Male"> Male 
        <input type="radio" name="gender" value="Female"> Female<br><br>
        </div>
        
        <!-- Checkbox -->
        <label>Hobbies:</label>
        <input type="checkbox" name="hobbies" value="Music"> Music
        <input type="checkbox" name="hobbies" value="Sports"> Sports<br><br>

        <!-- Advanced Elements -->
        <label>Course:</label>
        <select id="course">
            <option>MCA</option>
            <option>BCA</option>
            <option>BBA</option>
        </select><br><br>

        <label>Message:</label><br>
        <textarea rows="3" cols="30" id="message" placeholder="Write here..."></textarea><br><br>

        <!-- Number Validation -->
        <label>Age:</label>
        <input type="number" min="18" max="30" id="age" required><br><br>

        <!-- Pattern Validation -->
        <label>Phone:</label>
        <input type="text" pattern="[0-9]{10}" id="phone" placeholder="10 digit number" required><br><br>

        <button type="submit">Submit</button>
    </form>
    </div>

    <script>
        function validateForm(){
            
            let name = document.getElementById("name").value;
            if(name =="") {
                alert("Please enter name.");
                return false;
            }

            let email = document.getElementById("email").value;
            if(email =="") {
                alert("Please enter email.");
                return false;
            }

            let password = document.getElementById("password").value;
            if(password =="") {
                alert("Password cannot be empty.");
                return false;
            }
            if(password.length < 6) {
                alert("Password must be at least 6 charactters.");
                return false;
            }

            let gender = document.querySelector('input[name="gender"]:checked');
            if(gender ==null) {
                alert("Please select your gender.");
                return false;
            }

            let hobbies = document.querySelectorAll('input[name="hobbies"]:checked').length;
            if(hobbies ==0) {
                alert("Please select your hobbies.");
                return false;
            }
           
            let course =document.getElementById("course").value;

            if(course =="") {
                alert("Please select the course.");
                return false;
            }
            let message = document.getElementById("message").value;
            if(message =="") {
                alert("Please enter your message.");
                return false;
            }

            let age = document.getElementById("age").value;
            if(age =="") {
                alert("please enter your age.");
                return false;
            }
            if (age < 18 || age > 30) {
                alert("Please enter the age between 18 and 30.");
                return false;
            }

            let phone = document.getElementById("phone").value;
            if (phone =="") {
                alert("Please enter your phone number.");
                return false;
            }
            let phonePattern = /^[0-9]{10}$/;
            if (!phonePattern.test(phone)) {
                alert("Phone number must be 10 digits.");
                return false;
            }
            alert("Form submitted successfully..!");
            return true;
        }
    </script>
