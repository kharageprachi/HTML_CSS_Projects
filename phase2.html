<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Portal</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-br from-indigo-100 to-blue-200 min-h-screen">

<!-- HEADER -->

<header class="bg-indigo-600 text-white p-6 shadow-lg">
<div class="max-w-6xl mx-auto flex justify-between items-center">
<h1 class="text-2xl font-bold">Student Portal</h1>

<nav class="space-x-6">
<a href="#" class="hover:text-gray-200">Home</a>
<a href="#" class="hover:text-gray-200">Students</a>
<a href="#" class="hover:text-gray-200">Register</a>
<a href="#" class="hover:text-gray-200">Media</a>
</nav>

</div>
</header>

<div class="max-w-6xl mx-auto p-6 space-y-10">

<!-- TABLE SECTION -->

<section class="bg-white p-6 rounded-xl shadow-lg">

<h2 class="text-xl font-semibold mb-4">Student Table</h2>

<table class="w-full border border-gray-200">

<thead class="bg-indigo-500 text-white">

<tr>
<th class="p-3">Roll No</th>
<th class="p-3">Name</th>
<th class="p-3">Course</th>
</tr>

</thead>

<tbody class="text-center">

<tr class="border-t hover:bg-gray-100">
<td class="p-3">101</td>
<td class="p-3">Prachi</td>
<td class="p-3">BCA</td>
</tr>

<tr class="border-t hover:bg-gray-100">
<td class="p-3">102</td>
<td class="p-3">Vaishnavi</td>
<td class="p-3">BCA</td>
</tr>

</tbody>

<tfoot class="bg-gray-50 text-center font-semibold">
<tr>
<td colspan="3" class="p-3">Total Students : 2</td>
</tr>
</tfoot>

</table>

</section>

<!-- FORM -->

<section class="bg-white p-6 rounded-xl shadow-lg">

<h2 class="text-xl font-semibold mb-4">Registration Form</h2>

<form onsubmit="return validateForm()" class="space-y-4">

<input
id="name"
type="text"
placeholder="Name"
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-400">

<input
id="email"
type="email"
placeholder="Email"
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-400">

<input
id="password"
type="password"
placeholder="Password"
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-400">

<div>
<label class="font-semibold">Gender</label><br>

<label class="mr-4">
<input type="radio" name="gender"> Male
</label>

<label>
<input type="radio" name="gender"> Female
</label>
</div>

<div>
<label class="font-semibold">Hobbies</label><br>

<label class="mr-4">
<input type="checkbox" name="hobbies"> Music
</label>

<label>
<input type="checkbox" name="hobbies"> Sports
</label>
</div>

<select
id="course"
class="w-full p-3 border rounded-lg">

<option value="">Select Course</option>
<option>BCA</option>
<option>MCA</option>
<option>BBA</option>

</select>

<textarea
id="message"
rows="3"
placeholder="Message"
class="w-full p-3 border rounded-lg"></textarea>

<input
id="age"
type="number"
min="18"
max="30"
placeholder="Age"
class="w-full p-3 border rounded-lg">

<input
id="phone"
type="text"
placeholder="Phone (10 digits)"
class="w-full p-3 border rounded-lg">

<button
class="w-full bg-indigo-600 text-white p-3 rounded-lg hover:bg-indigo-700 transition">

Submit

</button>

</form>

</section>

<!-- DIV VS SPAN -->

<section class="bg-white p-6 rounded-xl shadow-lg">

<h2 class="text-xl font-semibold mb-4">DIV vs SPAN</h2>

<div class="bg-blue-100 p-4 rounded-lg text-center mb-4">
This is a DIV (block element)
</div>

<p>
This is a <span class="text-pink-600 font-semibold">SPAN</span> (inline element)
</p>

</section>

<!-- AUDIO -->

<section class="bg-white p-6 rounded-xl shadow-lg">

<h2 class="text-xl font-semibold mb-4">Audio</h2>

<audio controls class="w-full">
<source src="audio.mp3">
</audio>

</section>

<!-- VIDEO -->

<section class="bg-white p-6 rounded-xl shadow-lg">

<h2 class="text-xl font-semibold mb-4">Video</h2>

<video controls class="rounded-lg w-full max-w-xl">
<source src="video.mp4">
</video>

</section>

<!-- YOUTUBE -->

<section class="bg-white p-6 rounded-xl shadow-lg">

<h2 class="text-xl font-semibold mb-4">YouTube</h2>

<iframe
class="rounded-lg"
width="420"
height="240"
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
allowfullscreen>
</iframe>

</section>

<!-- MAP -->

<section class="bg-white p-6 rounded-xl shadow-lg">

<h2 class="text-xl font-semibold mb-4">Google Map</h2>

<iframe
class="rounded-lg"
width="100%"
height="350"
src="https://www.google.com/maps?q=kolhapur&output=embed">
</iframe>

</section>

</div>

<footer class="text-center p-6 text-gray-600">
© 2026 Student Portal
</footer>


<script>

function validateForm(){

let name=document.getElementById("name").value;

if(name==""){
alert("Please enter name")
return false
}

let email=document.getElementById("email").value

if(email==""){
alert("Please enter email")
return false
}

let password=document.getElementById("password").value

if(password.length<6){
alert("Password must be at least 6 characters")
return false
}

let gender=document.querySelector('input[name="gender"]:checked')

if(gender==null){
alert("Please select gender")
return false
}

let hobbies=document.querySelectorAll('input[name="hobbies"]:checked').length

if(hobbies==0){
alert("Select at least one hobby")
return false
}

let age=document.getElementById("age").value

if(age<18 || age>30){
alert("Age must be between 18 and 30")
return false
}

let phone=document.getElementById("phone").value

let pattern=/^[0-9]{10}$/

if(!pattern.test(phone)){
alert("Phone must be 10 digits")
return false
}

alert("Form submitted successfully")

return true

}

</script>

</body>
</html>
