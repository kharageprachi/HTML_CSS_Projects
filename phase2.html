<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 2</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 20px;
        }
        table{
            width: 30%;
            border-collapse: collapse;
            background-color: white;
        }
        th{
           background-color: #4CAF50;
           color: white; 
        }

        th, td{
            padding: 10px;
            text-align: center;
        }

        form{
            background-color: white;
            padding: 15px;
            width: 500px;
            border-radius: 8px;
        }
        input, select, textarea{
            width: 50px;
            padding: 5px;
        }
        button{
            background-color: #4CAF50;
            color: white;
            padding: 8px;
            border: none;
            cursor: pointer;
            text-align: center;
            width: 100px;
            margin-left: 200px;
           }
        .box{
            background-color: lightblue;
            padding: 10px;
            margin-top: 10px;
        }
        .highlight{
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
   <table border="1">
    
    <thead>
        <tr>
            <th>Roll No</th>
            <th>Name</th>
            <th>Course</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>101</td>
            <td>Prachi</td>
            <td>BCA</td>
        </tr>
        <tr>
            <td>102</td>
            <td>Vaishnavi</td>
            <td>BCA</td>
        </tr>
    </tbody>

    <tfoot>
        <tr>
            <td colspan="3">Total Students: 2</td>
        </tr>
    </tfoot>

</table> 

    <hr>

    <!-- 2. FORM -->
    <h2>Registration Form</h2>
    <form>
        
        <!-- Basic Inputs -->
        <label>Name:</label>
        <input type="text" placeholder="Enter name" required><br><br>

        <label>Email:</label>
        <input type="email" placeholder="Enter email" required><br><br>

        <label>Password:</label>
        <input type="password" required><br><br>

        <!-- Radio -->
        <label>Gender:</label>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female<br><br>

        <!-- Checkbox -->
        <label>Hobbies:</label>
        <input type="checkbox"> Music
        <input type="checkbox"> Sports<br><br>

        <!-- Advanced Elements -->
        <label>Course:</label>
        <select>
            <option>MCA</option>
            <option>BCA</option>
            <option>BBA</option>
        </select><br><br>

        <label>Message:</label><br>
        <textarea rows="3" cols="30" placeholder="Write here..."></textarea><br><br>

        <!-- Number Validation -->
        <label>Age:</label>
        <input type="number" min="18" max="30" required><br><br>

        <!-- Pattern Validation -->
        <label>Phone:</label>
        <input type="text" pattern="[0-9]{10}" placeholder="10 digit number" required><br><br>

        <button type="submit">Submit</button>
    </form>

    <hr>

    <!-- 3. DIV vs SPAN -->
    <div class="box">
        This is a DIV (block element).
    </div>

    <p>
        This is a <span  class="highlight">SPAN</span> (inline element).
    </p>

    <hr>

    <!-- 4. AUDIO -->
    <h2>Audio Example</h2>
    <audio controls>
        <source src="audio.mp3" type="audio/mpeg">
        <source src="audio.ogg" type="audio/ogg">
        Your browser does not support audio.
    </audio>

    <hr>

    <!-- 5. VIDEO -->
    <h2>Video Example</h2>
    <video width="320" controls>
        <source src="video.mp4" type="video/mp4">
        <source src="video.ogg" type="video/ogg">
        Your browser does not support video.
    </video>

    <hr>

    <!-- 6. IFRAME (YouTube + Google Maps Example) -->
    <h2>YouTube Video</h2>
    <iframe width="300" height="200"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        allowfullscreen>
    </iframe>

    <h2>Google Map</h2>
    <iframe
        src="https://www.google.com/maps/embed?pb=!1m18..."
        width="300" height="200">
    </iframe>

</body>
</html>
